## Gateway Config
spring.application.name=est-gateway-v2
## SSL Server
server.port=8888
server.http2.enabled=true
server.ssl.enabled=true
server.ssl.key-alias=
server.ssl.key-store-type=PKCS12
server.ssl.key-store=
server.ssl.key-store-password=123456
server.ssl.trust-certificate-private-key=
## Cloud Gateway 
spring.cloud.gateway.server.webflux.httpclient.ssl.trusted-x509-certificates=
spring.cloud.gateway.server.webflux.httpclient.ssl.key-password=
spring.cloud.gateway.server.webflux.httpclient.ssl.key-store=
spring.cloud.gateway.server.webflux.httpclient.ssl.key-store-type=PKCS12
